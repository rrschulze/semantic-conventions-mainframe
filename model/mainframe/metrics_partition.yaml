groups:
# Active processors
  - id: metric.mainframe.partition.cpu.virtual.count
    type: metric
    metric_name: mainframe.partition.cpu.virtual.count
    annotations:
      code_generation:
        metric_value_type: int
    stability: development
    brief: "The number of virtual processors allocated to an active partition."
    instrument: updowncounter
    unit: "{cpu}"
    extends: metric.system.cpu.physical.count
    entity_associations:
      - mainframe.partition
    attributes:
      - ref: mainframe.cpu.type
        requirement_level: required
# Processor capping metrics
  - id: metric.mainframe.partition.cpu.is_capped
    type: metric
    metric_name: mainframe.partition.cpu.is_capped
    annotations:
      code_generation:
        metric_value_type: bool
    stability: development
    brief: "Indicates whether absolute capping is enabled the processors of the specified type allocated to a partition (0=false, 1=true)."
    instrument: updowncounter
    unit: "{cpu}"
    entity_associations:
      - mainframe.partition
    attributes:
      - ref: mainframe.cpu.type
        requirement_level: required
  - id: metric.mainframe.partition.cpu.capped.count
    type: metric
    metric_name: mainframe.partition.cpu.capped.count
    annotations:
      code_generation:
        metric_value_type: int
    stability: development
    brief: "Maximum number of processors of the specified typethat can be used if absolute capping is enabled, otherwise 0"
    instrument: updowncounter
    unit: "{cpu}"
    entity_associations:
      - mainframe.partition
    attributes:
      - ref: mainframe.cpu.type
        requirement_level: required
# Reserved processors
  - id: metric.mainframe.partition.cpu.reserved.count
    type: metric
    metric_name: mainframe.partition.cpu.reserved.count
    annotations:
      code_generation:
        metric_value_type: int
    stability: development
    brief: "The number of processors of the specified type reserved for the active partition."
    instrument: updowncounter
    unit: "{cpu}"
    entity_associations:
      - mainframe.partition
    attributes:
      - ref: mainframe.cpu.type
        requirement_level: required
# Partition weight
  - id: metric.mainframe.partition.cpu.weight
    type: metric
    metric_name: mainframe.partition.cpu.weight
    annotations:
      code_generation:
        metric_value_type: int
    stability: development
    brief: "The weight of the active partition."
    instrument: updowncounter
    unit: "{cpu}"
    entity_associations:
      - mainframe.partition
  - id: metric.mainframe.partition.cpu.weight.is_capped
    type: metric
    metric_name: mainframe.partition.cpu.weight.is_capped
    annotations:
      code_generation:
        metric_value_type: bool
    stability: development
    brief: "Indicating whether the initial CP processing weight is capped (0=false, 1=true)."
    instrument: updowncounter
    unit: "{cpu}"
    entity_associations:
      - mainframe.partition