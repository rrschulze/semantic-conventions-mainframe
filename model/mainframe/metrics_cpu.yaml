groups:
# CPU utilization metrics. One possible source is the CPU metric group of the IBM Z HMC Web Services API.
  - id: metric.mainframe.cpu.utilization
    type: metric  
    metric_name: mainframe.cpu.utilization
    annotations:
      code_generation:
        metric_value_type: int
    stability: development
    brief: "The percentage of time the CPU was processing I/O."
    instrument: gauge
    unit: "1"
    entity_associations:
      - mainframe.cpu
# SMT mode metrics. One possible source is the CPU metric group of the IBM Z HMC Web Services API.
  - id: metric.mainframe.cpu.smt_mode.utilization
    type: metric  
    metric_name: mainframe.cpu.smt_mode.utilization
    annotations:
      code_generation:
        metric_value_type: int
    stability: development
    brief: "The percentage of time the processor is running in simultaneous multithreading (SMT) mode. Set to -1 when SMT mode is not supported by the mainframe."
    instrument: gauge
    unit: "1"
    entity_associations:
      - mainframe.cpu
  - id: metric.mainframe.cpu.thread-0.utilization
    type: metric  
    metric_name: mainframe.cpu.thread-0.utilization
    annotations:
      code_generation:
        metric_value_type: int
    stability: development
    brief: "The percent usage of thread 0 when the processor is running in simultaneous multithreading (SMT) mode. Set to -1 when SMT mode is not supported by the mainframe."
    instrument: gauge
    unit: "{cpu}"
    entity_associations:
      - mainframe.cpu
  - id: metric.mainframe.cpu.thread-1.utilization
    type: metric  
    metric_name: mainframe.cpu.thread-1.utilization
    annotations:
      code_generation:
        metric_value_type: int
    stability: development
    brief: "The percent usage of thread 1 when the processor is running in simultaneous multithreading (SMT) mode. Set to -1 when SMT mode is not supported by the mainframe."
    instrument: gauge
    unit: "{cpu}"
    entity_associations:
      - mainframe.cpu