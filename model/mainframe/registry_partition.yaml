groups:
  - id: registry.mainframe.partition
    type: attribute_group
    display_name: Mainframe Partition attributes
    brief: This document defines attributes of a Mainframe Logical Partition (LPAR).
    attributes:
      - id: mainframe.partition.name
        type: string
        stability: development
        brief: "Name of the logical partition that hosts a systems with a mainframe operating system."
        examples: ["LPAR01"]
      - id: mainframe.partition.weight.type
        stability: development
        brief: "Type of weight."
        type: 
          members:
            - id: initial
              value: "initial"
              brief: "Initial weight for the partition"
              stability: development
            - id: minimum
              value: "minimum"
              brief: "Minimum weight for the partition"
              stability: development
            - id: current
              value: "current"
              brief: "Current weight for the partition"
              stability: development
            - id: maximum
              value: "maximum"
              brief: "Maximum weight for the partition"
              stability: development

