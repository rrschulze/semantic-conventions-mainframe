groups:
  - id: registry.mainframe.memory
    type: attribute_group
    display_name: Mainframe memory attributes
    brief: This document defines attributes of the mainframe memory.
    attributes:
      - id: mainframe.memory.type
        stability: development
        brief: "Type of mainframe memory."
        type: 
          members:
            - id: total
              value: "total"
              brief: "Total amount of installed memory in the mainframe system."
              stability: development
            - id: hsa
              value: "HSA"
              brief: "Memory reserved for the base hardware system area (HSA), which is used for system management and I/O processing on the mainframe."
              stability: development
            - id: partitions
              value: "partitions"
              brief: "Memory for use by partitions, which are logical divisions of the mainframe system that can run separate operating systems and workloads."
              stability: development
            - id: central
              value: "central"
              brief: "Memory allocated as central storage across the active partitions in the mainframe system."
              stability: development
            - id: expanded
              value: "expanded"
              brief: "Memory allocated as expanded storage across the active partitions in the mainframe system."
              stability: development
            - id: available
              value: "available"
              brief: "Memory not allocated to active partitions in the mainframe system and available for use."
              stability: development

