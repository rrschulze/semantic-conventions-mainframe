groups:
  - id: registry.mainframe.host
    type: attribute_group
    display_name: Mainframe host attributes
    brief: This document defines attributes for a mainframe host, representing the physical machine known as the Central Processor Complex (CPC).
    attributes:
      - id: mainframe.host.serial_number
        type: string
        stability: development
        brief: "Serial number of the central processing complex (CPC)."
        examples: ["0000000ABCDE"]
      - id: mainframe.host.machine_type
        type: string
        stability: development
        brief: "Four-digit IBM machine type of the Central Processor Complex (CPC)."
        examples: ["9175", "3931"]
      - id: mainframe.host.machine_model
        type: string
        stability: development
        brief: "IBM machine model of the Central Processor Complex (CPC)."
        examples: ["ME1", "ML1", "A01", "LA1"]
      - id: mainframe.host.temperature.type
        stability: development
        brief: "Location of the Central Processor Complex (CPC)."
        type: 
          members:
            - id: ambient
              value: "ambient"
              brief: "Ambient temperature."
              stability: development
            - id: exhaust
              value: "exhaust"
              brief: "Exhaust temperature."
              stability: development
      - id: mainframe.host.heatload.type
        stability: development
        brief: "Type of heat load measurement for the Central Processor Complex (CPC)."
        type: 
          members:
            - id: total
              value: "total"
              brief: "Total heat load."
              stability: development
            - id: forced-air
              value: "forced-air"
              brief: "Forced-air heat load."
              stability: development
            - id: water
              value: "water"
              brief: "Water heat load."
              stability: development
      - id: mainframe.host.power.usage.type
        stability: development
        brief: "Type of power usage measurement for the Central Processor Complex (CPC)."
        type: 
          members:
            - id: total
              value: "total"
              brief: "Total power usage."
              stability: development
            - id: partitions
              value: "partitions"
              brief: "Total power consumption of all partitions."
              stability: development
            - id: infrastructure
              value: "infrastructure"
              brief: "Total power consumption of all infrastructure components."
              stability: development
            - id: unassigned
              value: "unassigned"
              brief: "Total power consumption of all unassigned components."
              stability: development
      - id: mainframe.host.power.cord
        stability: development
        brief: "Identfies the power cord of the Central Processor Complex (CPC)."
        type: 
          members:
            - id: cord1
              value: "1"
              brief: "Power cord 1."
              stability: development
            - id: cord2
              value: "2"
              brief: "Power cord 2."
              stability: development
            - id: cord3
              value: "3"
              brief: "Power cord 3."
              stability: development
            - id: cord4
              value: "4"
              brief: "Power cord 4."
              stability: development
            - id: cord5
              value: "5"
              brief: "Power cord 5."
              stability: development
            - id: cord6
              value: "6"
              brief: "Power cord 6."
              stability: development
            - id: cord7
              value: "7"
              brief: "Power cord 7."
              stability: development
            - id: cord8
              value: "8"
              brief: "Power cord 8."
              stability: development
      - id: mainframe.host.power.phase
        stability: development
        brief: "Identifies the power phase of the Central Processor Complex (CPC)."
        type: 
          members:
            - id: A
              value: "A"
              brief: "Power phase A."
              stability: development
            - id: B
              value: "B"
              brief: "Power phase B."
              stability: development
            - id: C
              value: "C"
              brief: "Power phase C."
              stability: development  