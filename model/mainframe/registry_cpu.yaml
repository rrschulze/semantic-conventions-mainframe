groups:
  - id: registry.mainframe.cpu
    type: attribute_group
    display_name: Mainframe CPU attributes
    brief: This document defines attributes of a Mainframe Central Processing Complex (CPC).
    attributes:
      - id: mainframe.cpu.type
        stability: development
        brief: "Type of the central processing complex that hosts a mainframe operating system."
        type: 
          members:
            - id: cp
              value: "CP"
              brief: "Central Processor (CP) is the main processor of the central processing complex that hosts a mainframe operating system."
              stability: development
            - id: ifl
              value: "IFL"
              brief: "Integrated Facility for Linux (IFL) is a processor that is dedicated to running Linux workloads on the mainframe."
              stability: development
            - id: ziip
              value: "zIIP"
              brief: "z Integrated Information Processor (zIIP) is a processor that is dedicated to running specific workloads on the mainframe, such as Java and XML processing."
              stability: development
            - id: zaap
              value: "zAAP"
              brief: "z Application Assist Processor (zAAP) is a processor that is dedicated to running specific workloads on the mainframe, such as Java and XML processing."
              stability: development
            - id: icf
              value: "ICF"
              brief: "Integrated Coupling Facility (ICF) is a processor that is dedicated to running workloads related to the coupling facility, which is used for high-speed communication between mainframe systems in a sysplex."
              stability: development
            - id: sap
              value: "SAP"
              brief: "System Assist Processor (SAP) is a processor that is dedicated to running workloads related to system management and I/O processing on the mainframe."
              stability: development

