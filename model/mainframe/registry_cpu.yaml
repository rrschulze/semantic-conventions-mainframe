groups:
  - id: registry.mainframe.cpu
    type: attribute_group
    display_name: Mainframe CPU attributes
    brief: This document defines attributes of the mainframe processors.
    attributes:
      - id: mainframe.cpu.name
        stability: development
        brief: "The name of the processor in the form processor-type + processor ID."
        type: string
        examples: ["IFL01"]  
      - id: mainframe.cpu.type
        stability: development
        brief: "Type of mainframe processor."
        type: 
          members:
            - id: all
              value: "all"
              brief: "All types of mainframe processors."
              stability: development
            - id: cp
              value: "cp"
              brief: "Central Processor (CP) is the main processor of the central processing complex that hosts a mainframe operating system."
              stability: development
            - id: icf
              value: "icf"
              brief: "Integrated Coupling Facility (ICF) is a processor that is dedicated to running workloads related to the coupling facility, which is used for high-speed communication between mainframe systems in a sysplex."
              stability: development
            - id: ifl
              value: "ifl"
              brief: "Integrated Facility for Linux (IFL) is a processor that is dedicated to running Linux workloads on the mainframe."
              stability: development
            - id: iip
              value: "iip"
              brief: "z Integrated Information Processor (zIIP) is a processor that is dedicated to running specific workloads on the mainframe, such as Java applications."
              stability: development
            - id: aap
              value: "aap"
              brief: "Application Assist Processor (AAP) is a processor that is dedicated to running workloads related to Java and XML processing for database workloads on the mainframe."
              stability: development
            - id: sap
              value: "sap"
              brief: "System Assist Processor (SAP) is a processor that is dedicated to running workloads related to system management and I/O processing on the mainframe."
              stability: development
      - id: mainframe.cpu.shareing.mode
        stability: development
        brief: "Mode the processor is operating in. The mode can be either 'dedicated' or 'shared'."
        type: 
          members:
            - id: all
              value: "all"
              brief: "All mainframe processors, both shared and dedicated"
              stability: development
            - id: dedicated
              value: "dedicated"
              brief: "The processor is dedicated to a specific partition and cannot be shared with other partitions."
              stability: development
            - id: shared
              value: "shared"
              brief: "The processor can be shared among multiple partitions and is not dedicated to a specific partition."
              stability: development

