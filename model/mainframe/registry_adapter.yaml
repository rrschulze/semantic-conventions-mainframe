groups:
  - id: registry.mainframe.adapter
    type: attribute_group
    display_name: Mainframe adapter attributes
    brief: This document defines attributes of mainframe I/O adapters, such as crypto adapters, accelerator adapters, and network adapters.
    attributes:
      - id: mainframe.adapter.name
        stability: development
        brief: "The name of the I/O adapter in the form CSS.Chpid."
        type: string
        examples: ["0.00", "0.2D", "1.E3"]
      - id: mainframe.adapter.type
        stability: development
        brief: "Type of the adapter."
        type: 
          members:
            - id: crypto
              value: "crypto"
              brief: "A crypto adapter."
              stability: development
            - id: accelerator
              value: "accelerator"
              brief: "An accelerator adapter."
              stability: development
            - id: network
              value: "network"
              brief: "A network adapter."
              stability: development
            - id: storage
              value: "storage"
              brief: "A storage adapter."
              stability: development
      - id: mainframe.adapter.owning.partition
        stability: development
        brief: "The partition that owns the I/O adapter, in case the adapter is dedicated to a specific partition. If the adapter is shared, this attribute is set to 'shared'."
        type: string
        examples: ["LPAR01", "shared"]

