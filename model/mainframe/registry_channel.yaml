groups:
  - id: registry.mainframe.channel
    type: attribute_group
    display_name: Mainframe I/O channel attributes
    brief: This document defines attributes of the mainframe I/O channels.
    attributes:
      - id: mainframe.channel.name
        stability: development
        brief: "The name of the I/O channel in the form CSS.Chpid."
        type: string
        examples: ["0.00", "0.2D", "1.E3"]
      - id: mainframe.channel.mode
        stability: development
        brief: "Mode the I/O channel is operating in. The mode can be either 'dedicated' or 'shared'."
        type: 
          members:
            - id: dedicated
              value: "dedicated"
              brief: "The I/O channel is dedicated to a specific partition and cannot be shared with other partitions."
              stability: development
            - id: shared
              value: "shared"
              brief: "The I/O channel can be shared among multiple partitions and is not dedicated to a specific partition."
              stability: development
      - id: mainframe.channel.owning.partition
        stability: development
        brief: "The partition that owns the I/O channel, in case the channel is dedicated to a specific partition. If the channel is shared, this attribute is set to 'shared'."
        type: string
        examples: ["LPAR01", "shared"]

