groups:
  - id: entity.mainframe.host
    type: entity
    stability: development
    name: mainframe.host
    brief: A mainframe host, representing the pyhsical machine, also known as the Central Processor Complex (CPC). 
    attributes:
      - ref: host.name
        role: identifying
        requirement_level: required
        examples: ["CPC01"]
      - ref: host.id
        requirement_level: recommended
        role: descriptive
        note: >
          The host.id SHOULD be the object-id UUID of the Central Processor Complex (CPC) as defined by the Hardware Management Console (HMC) Web Services API.
        examples: ["d9c47445-64df-39f6-9d74-6376701508b5"]
      - ref: host.type
        role: descriptive
        requirement_level: recommended
        note: >
          The host.type SHOULD be the concatenation of the IBM machine type and model of the Central Processor Complex (CPC).
        examples: ["9175-ME1"]      
      - ref: host.arch
        role: descriptive
        requirement_level: recommended
        examples: ["s390x"]
      - ref: mainframe.host.serial_number
        role: descriptive
        requirement_level: recommended
        examples: ["0000000ABCDE"]
      - ref: mainframe.host.machine_type
        role: descriptive
        requirement_level: recommended
        examples: ["9175"]
      - ref: mainframe.host.machine_model
        role: descriptive
        requirement_level: recommended
        examples: ["ME1"]
  - id: entity.mainframe.channel
    type: entity
    stability: development
    name: mainframe.channel
    brief: A mainframe channel, representing the physical I/O channel that connects the Central Processor Complex (CPC) to peripheral devices. 
    attributes:
      - ref: mainframe.channel.name
        role: identifying
        requirement_level: required
        examples: ["0.00", "0.2D", "1.E3"]
      - ref: mainframe.channel.mode
        role: descriptive
        requirement_level: required
        examples: ["dedicated", "shared"]
      - ref: mainframe.channel.owning.partition
        role: descriptive
        requirement_level: recommended
        examples: ["LPAR01", "shared"]