groups:
# Channel utilization metrics. One possible source is the Channels metric group of the IBM Z HMC Web Services API.
  - id: metric.mainframe.channel.utilization
    type: metric  
    metric_name: mainframe.channel.utilization
    annotations:
      code_generation:
        metric_value_type: int
    stability: development
    brief: "The percentage of time the channel was processing I/O."
    instrument: gauge
    unit: "1"
    entity_associations:
      - mainframe.channel
    attributes:
      - ref: mainframe.channel.mode
        requirement_level: required
