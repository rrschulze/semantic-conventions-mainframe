# Local v2 markdown templates. See plan at .claude/plans/encapsulated-exploring-flamingo.md.
#
# Filters operate on the resolved registry that `weaver registry generate --v2`
# hands to templates. Shape:
#   .registry.attributes -- fully inlined attribute objects, contains only
#                           locally-owned attributes (verified empirically).
#   .registry.{spans,metrics,events,attribute_groups,entities} -- local signals.
#   .refinements.{spans,metrics,events,...} -- refinement definitions.
#   .schema_url -- the local registry's schema URL.
# Each attribute carries `provenance.path` pointing at the model file.
#
# Namespace bucketing: split the attribute key on `.` and group by the first
# segment. `aws.bedrock.*` therefore lands under "aws"; refine by hand-list if
# we ever need finer granularity.
templates:
  - pattern: attributes_readme.md.j2
    filter: semconv_grouped_attributes({"v2":true})
    application_mode: single
    file_name: attributes/README.md

  - pattern: attribute_namespace.md.j2
    filter: semconv_grouped_attributes({"v2":true})
    application_mode: each
    file_name: "attributes/{{ ctx.root_namespace | kebab_case }}.md"

  - pattern: registry_readme.md.j2
    filter: "."
    application_mode: single
    file_name: README.md

  - template: metrics.md.j2
    filter: try semconv_grouped_metrics({"v2":true, "exclude_deprecated":true}) catch empty
    application_mode: each
    file_name: "{{ ctx.root_namespace | snake_case }}/metrics.md"

  - template: spans.md.j2
    filter: >
      try (semconv_signal("span"; {"v2":true, "exclude_deprecated":true})
      | group_by(.root_namespace)
      | map({ root_namespace: .[0].root_namespace, spans: . | sort_by(.type) })) catch empty
    application_mode: each
    file_name: "{{ ctx.root_namespace | snake_case }}/spans.md"

  - template: events.md.j2
    filter: >
      try (semconv_signal("event"; {"v2":true, "exclude_deprecated":true})
      | group_by(.root_namespace)
      | map({ root_namespace: .[0].root_namespace, events: . | sort_by(.name) })) catch empty
    application_mode: each
    file_name: "{{ ctx.root_namespace | snake_case }}/events.md"

  - template: entities.md.j2
    filter: >
      try (semconv_signal("entity"; {"v2":true, "exclude_deprecated":true})
      | group_by(.root_namespace)
      | map({ root_namespace: .[0].root_namespace, entities: . | sort_by(.type) })) catch empty
    application_mode: each
    file_name: "{{ ctx.root_namespace | snake_case }}/entities.md"

  - template: deprecated.md.j2
    filter: >
      {
        attributes: (try (.registry.attributes | map(select(has("deprecated")))) catch []),
        metrics: (try (.registry.metrics | map(select(has("deprecated")))) catch []),
        spans: (try (.registry.spans | map(select(has("deprecated")))) catch []),
        events: (try (.registry.events | map(select(has("deprecated")))) catch []),
        entities: (try (.registry.entities | map(select(has("deprecated")))) catch [])
      }
    application_mode: single
    file_name: "deprecated.md"

acronyms:
  - AI
  - AWS
  - Bedrock
  - GenAI
  - MCP
  - OpenAI
